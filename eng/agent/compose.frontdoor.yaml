services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    command: ["caddy", "run", "--config", "/etc/caddy/config.json"]
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:2019:2019"
    configs:
      - source: caddy_config
        target: /etc/caddy/config.json
    volumes:
      - ${LUFF_CADDY_DIR:-caddy_data}:/data
    networks:
      - luff

  agent:
    environment:
      Agent__HostsFrontDoor: "true"
      Agent__CaddyAdminAddress: "http://caddy:2019"
    depends_on:
      caddy:
        condition: service_started

networks:
  luff:
    name: luff

volumes:
  caddy_data:

configs:
  caddy_config:
    content: |
      {
        "admin": { "listen": "0.0.0.0:2019" },
        "apps": {
          "http": {
            "servers": {
              "srv0":   { "listen": [":80"],  "routes": [] },
              "srv443": { "listen": [":443"], "routes": [] }
            }
          }
        }
      }
