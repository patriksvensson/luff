name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet test src/Luff.slnx -c Release
      - name: OpenAPI spec is committed and current
        run: git diff --exit-code src/openapi.json

  images:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { component: server, dockerfile: src/Luff.Server/Dockerfile }
          - { component: agent, dockerfile: src/Luff.Agent/Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # Emulate the arm64 final stage on the amd64 runner
      - uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/luff-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: test
    if: github.ref_type == 'tag' # a GitHub release needs a tag; skip on manual dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - run: dotnet tool restore

      - name: Build the self-contained tarballs
        run: dotnet run build.cs --target Package

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          artifacts/*.tar.gz
          eng/install.sh
          --generate-notes
          ${{ contains(github.ref_name, '-') && '--prerelease' || '' }}
